title = "Stellar-Save Gitleaks Config"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore example/placeholder values"
regexes = [
  '''<your-contract-id>''',
  '''your_.*_here''',
  '''PLACEHOLDER''',
]
paths = [
  '''.env.example''',
  '''frontend/.env.testnet.example''',
  '''docs/.*''',
  '''README.md''',
]
