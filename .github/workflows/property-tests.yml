name: Property Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/**'

jobs:
  property-tests:
    name: Proptest Property-Based Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run property tests
        run: |
          cargo test \
            --manifest-path contracts/stellar-save/Cargo.toml \
            --test-threads=1 \
            property_tests \
            -- --nocapture
        env:
          PROPTEST_CASES: 256

      - name: Run fuzz tests
        run: |
          cargo test \
            --manifest-path contracts/stellar-save/Cargo.toml \
            --test-threads=1 \
            fuzz_tests \
            -- --nocapture
        env:
          PROPTEST_CASES: 256
