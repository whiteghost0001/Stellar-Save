name: Load Testing

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Test scenario (smoke, load, stress)'
        required: false
        default: 'smoke'

jobs:
  load-test:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test: [api, frontend, contract]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend server
        working-directory: backend
        run: |
          npm start &
          echo $! > backend.pid
          sleep 5

      - name: Start frontend server
        working-directory: frontend
        run: |
          npm run preview &
          echo $! > frontend.pid
          sleep 3

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 ${{ matrix.test }} test
        env:
          SCENARIO: ${{ github.event.inputs.scenario || 'smoke' }}
          BASE_URL: http://localhost:3000
          FRONTEND_URL: http://localhost:4173
        run: k6 run tests/load/${{ matrix.test }}.test.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ matrix.test }}
          path: tests/load/results/
          retention-days: 7

      - name: Stop servers
        if: always()
        run: |
          [ -f backend/backend.pid ] && kill $(cat backend/backend.pid) || true
          [ -f frontend/frontend.pid ] && kill $(cat frontend/frontend.pid) || true
