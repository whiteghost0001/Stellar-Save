name: Dependency Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'design/**'
  schedule:
    - cron: '0 7 * * 1'  # Weekly Monday 7am UTC

permissions:
  contents: read
  security-events: write

jobs:
  snyk-frontend:
    name: Snyk (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk (Node)
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-frontend.sarif
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          working-directory: frontend
        continue-on-error: true

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-frontend.sarif
          category: snyk-frontend

  snyk-rust:
    name: Snyk (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk (Rust)
        uses: snyk/actions/rust@master
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-rust.sarif
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-rust.sarif
          category: snyk-rust

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
